name: Get Space News

on:
  schedule:
    - cron: "0 10 * * *"  # 中国时间18:00，与原热点错开
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run TrendRadar (Space News Only)
        env:
          DINGTALK_WEBHOOK_URL: ${{ secrets.DINGTALK_WEBHOOK_URL }}
          WEWORK_WEBHOOK_URL: ${{ secrets.WEWORK_WEBHOOK_URL }}
        # 关键：直接在命令中替换配置文件路径，强制加载航天配置！
        run: |
          # 备份原热点配置（运行完恢复，不影响原热点）
          mv config/config.yaml config/config_default.yaml
          mv config/frequency_words.txt config/frequency_words_default.txt
          
          # 用航天配置替换默认配置
          cp config/config_space.yaml config/config.yaml
          cp config/frequency_words_space.txt config/frequency_words.txt
          
          # 运行程序（此时加载的是航天配置）
          python -m trendradar
          
          # 恢复原热点配置（确保原工作流正常运行）
          mv config/config_default.yaml config/config.yaml
          mv config/frequency_words_default.txt config/frequency_words.txt
