app:
  timezone: "Asia/Shanghai"
  show_version_update: true

platforms:
  enabled: true
  sources:
    # 只保留1个最精准的航天源，其他全剔除
    - id: "ithome"
      name: "IT之家"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1
  feeds:
    # 只保留航天RSS源
    - id: "china-space"
      name: "中国航天科技集团"
      url: "https://www.casc.cn/rss.xml"
    - id: "nasa"
      name: "NASA 官方新闻"
      url: "https://www.nasa.gov/rss/dyn/allstories.rss"
    # 禁用所有其他RSS源
    - id: "ruanyifeng"
      enabled: false
    - id: "hacker-news"
      enabled: false

report:
  mode: "current"
  display_mode: "keyword"
  sort_by_position_first: true
  rank_threshold: 5
  max_news_per_keyword: 5  # 最多5条，避免冗余

display:
  region_order:
    - hotlist
    - new_items
    - rss
    - standalone
    - ai_analysis
  regions:
    hotlist: true
    new_items: true
    rss: true
    standalone: false
    ai_analysis: false

notification:
  enabled: true
  push_window:
    enabled: false
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    bark:
      url: ""
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0
  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7

ai:
  model: "deepseek/deepseek-chat"
  api_key: ""
  api_base: ""
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: []

ai_analysis:
  enabled: false
  analysis_window:
    enabled: false
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 60
  include_rss: true
  include_rank_timeline: true

ai_translation:
  enabled: false
  language: "English"
  prompt_file: "ai_translation_prompt.txt"

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━━━━"
