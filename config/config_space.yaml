# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件
#                      Version: 1.2.0
# ═══════════════════════════════════════════════════════════════
app:
  timezone: "Asia/Shanghai"
  show_version_update: true

platforms:
  enabled: true
  sources:
    # 只保留能抓取航天内容的垂直平台，剔除其他所有平台
    - id: "ithome"
      name: "IT之家"
    - id: "guancha"
      name: "观察者网"

rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 1  # 只抓1天内的新鲜航天新闻，减少旧闻干扰
  feeds:
    # 只保留航天专属 RSS 源，禁用所有其他源
    - id: "space-news"
      name: "Space.com 航天新闻"
      url: "https://www.space.com/feeds/all"
    - id: "china-space"
      name: "中国航天科技集团"
      url: "https://www.casc.cn/rss.xml"
    - id: "nasa"
      name: "NASA 官方新闻"
      url: "https://www.nasa.gov/rss/dyn/allstories.rss"
    # 禁用所有非航天 RSS 源
    - id: "ruanyifeng"
      name: "阮一峰的网络日志"
      url: "http://www.ruanyifeng.com/blog/atom.xml"
      enabled: false
    - id: "hacker-news"
      name: "Hacker News"
      url: "https://hnrss.org/frontpage"
      enabled: false

report:
  mode: "current"
  display_mode: "keyword"
  sort_by_position_first: true  # 按航天组优先排序，不按热度
  rank_threshold: 5
  max_news_per_keyword: 10  # 最多显示10条航天新闻，避免冗余

display:
  region_order:
    - hotlist  # 航天热榜放最前面
    - new_items
    - rss
    - standalone
    - ai_analysis
  regions:
    hotlist: true
    new_items: true
    rss: true
    standalone: false
    ai_analysis: false  # 关闭AI分析（避免未配置API Key报错）
  standalone:
    platforms: []
    rss_feeds: []
    max_items: 20

notification:
  enabled: true
  push_window:
    enabled: false
    start: "20:00"
    end: "22:00"
    once_per_day: true
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    bark:
      url: ""
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0
  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7

ai:
  model: "deepseek/deepseek-chat"
  api_key: ""
  api_base: ""
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: []

ai_analysis:
  enabled: false  # 未配置API Key，暂时关闭
  analysis_window:
    enabled: false
    start: "09:00"
    end: "22:00"
    once_per_day: false
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 60
  include_rss: true
  include_rank_timeline: true

ai_translation:
  enabled: false
  language: "English"
  prompt_file: "ai_translation_prompt.txt"

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━━━━"
